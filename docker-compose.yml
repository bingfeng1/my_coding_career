version: "3.9"

services:
  mongo:
    image: mongo:5
    container_name: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    volumes:
      - ./docker-data/mongo/data:/data/db
      - ./docker-data/mongo/config:/data/configdb

  mongo-express:
    image: mongo-express
    container_name: mongo-express
    restart: always
    ports:
      - 5100:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: root
      ME_CONFIG_BASICAUTH_USERNAME: root
      ME_CONFIG_BASICAUTH_PASSWORD: root
      ME_CONFIG_MONGODB_URL: mongodb://root:root@mongo:27017/
    depends_on:
      - mongo

  mariadb:
    image: mariadb:10
    container_name: mariadb
    restart: always
    volumes:
      - ./docker-data/mariadb/config:/etc/mysql/conf.d
      - ./docker-data/mariadb/data:/var/lib/mysql
    environment:
      MARIADB_ROOT_PASSWORD: root

  back:
    build:
      context: ./back
      dockerfile: Dockerfile
    image: visual_back:0.0.1
    container_name: visual_back
    restart: always
    environment:
      mariadb: mariadb
      mongodb: mongo
      dbName: _VISUAL
    depends_on:
      - mongo
      - mariadb

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    image: visual_front:0.0.1
    container_name: visual_front
    restart: always
    ports:
      - "5000:80"
    depends_on:
      - back